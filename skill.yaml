name: auto-summary-system
version: 1.0.0
description: 自动化汇总系统 - 支持日报、周报自动生成与推送，采用多Skill协同架构
type: system

tags:
  - automation
  - reporting
  - productivity
  - summary
  - openclaw

skills:
  - storage-manager
  - daily-summary
  - weekly-summary
  - schedule-trigger
  - report-generator
  - client-notifier
  - main-coordinator

dependencies:
  pandas: ">=1.3.0"
  openpyxl: ">=3.0.0"
  schedule: ">=1.1.0"
  PyYAML: ">=5.4.0"
  requests: ">=2.25.0"
  python-dateutil: ">=2.8.0"

entry_points:
  main: "setup.py"
  cli: "main.py"

configuration:
  required:
    - client.email
    - notification.email.smtp_server
    - notification.email.username
    - notification.email.password
  
  defaults:
    storage_path: ./data
    report_output_path: ./reports
    daily_trigger_time: "18:00"
    weekly_trigger_day: "friday"
    weekly_trigger_time: "17:00"
    schedule.daily.enabled: true
    schedule.weekly.enabled: true
    report.format: excel
    report.include_charts: true

commands:
  add:
    description: "添加工作记录"
    usage: "add <content> [--category <category>]"
    example: "add '完成登录功能开发' --category '功能开发'"
  
  list:
    description: "列出工作记录"
    usage: "list [--limit <num>] [--today]"
    example: "list --today"
  
  report:
    description: "生成报表"
    usage: "report <daily|weekly> [--date <YYYY-MM-DD>] [--notify]"
    example: "report daily --notify"
  
  scheduler:
    description: "管理定时调度器"
    usage: "scheduler <start|stop|info|run>"
    example: "scheduler start"
  
  status:
    description: "显示系统状态"
    usage: "status"
  
  init:
    description: "初始化系统（创建必要目录）"
    usage: "init"

install:
  pre_install:
    - "echo '🚀 开始安装自动化汇总系统...'"
    - "python3 --version"
  
  post_install:
    - "echo '✅ 依赖包安装完成'"
    - "python3 main.py init"
    - "echo '🎉 安装完成！请编辑 config.yaml 配置文件'"
    - "echo '   关键配置: client.email 和 notification.email.*'"

author: OpenClaw Community
license: MIT
repository: https://github.com/1303996014/auto-summary-system
homepage: https://github.com/1303996014/auto-summary-system
documentation: https://github.com/1303996014/auto-summary-system/blob/main/README.md

keywords:
  - automation
  - reporting
  - summary
  - daily-report
  - weekly-report
  - email-notification
  - openclaw-skill

minimum_openclaw_version: "0.1.0"
python_version: ">=3.8"